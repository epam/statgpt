name: PR Workflow

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pre-commit:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"

      - name: Install pre-commit
        run: |
          python -m pip install --upgrade pip
          pip install pre-commit

      - name: Install pre-commit hooks
        run: pre-commit install

      - name: Check if files are properly formatted
        run: |
          echo "Running pre-commit on all files..."
          echo "If this step fails, it means pre-commit made changes to fix issues."
          echo "Please run 'pre-commit run --all-files' locally and commit the changes."
          echo ""

          # Run pre-commit and capture the exit code
          if pre-commit run --all-files --show-diff-on-failure; then
            echo "✅ All files are properly formatted!"
          else
            echo ""
            echo "❌ Pre-commit found issues and made changes."
            echo "Please run the following commands locally:"
            echo "  pip install pre-commit"
            echo "  pre-commit install"
            echo "  pre-commit run --all-files"
            echo "Then commit and push the changes."
            exit 1
          fi
